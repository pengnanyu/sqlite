name = "bms-sqlite"
main = "src/index.ts"
compatibility_date = "2024-06-20"

# KV Namespace 绑定
# 在 ESA 控制台创建 KV namespace 后，将 id 替换为实际值
# 或通过 esa.jsonc 中的 kv 配置自动绑定
[[kv_namespaces]]
binding = "PROTOCOL_KV"
id = "bms-protocol-db"

[[kv_namespaces]]
binding = "AUTH_KV"
id = "bms-auth"

# 环境变量（敏感信息请在 ESA 控制台设置）
[vars]
GITHUB_REPO = "pengnanyu/protocol-db"
GITHUB_BRANCH = "main"
JWT_SECRET = "bms-esa-jwt-2024"
# GITHUB_TOKEN 请在 ESA 控制台设置为环境变量
